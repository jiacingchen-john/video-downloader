<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>影片下載器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3147;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 28px;
      text-align: center;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      background: #12141e;
      border-radius: 10px;
      padding: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 9px 4px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all .2s;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: #2d3147;
      color: #e2e8f0;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: #12141e;
      border: 1px solid #2d3147;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }

    input[type="text"]:focus { border-color: #60a5fa; }
    input[type="text"]::placeholder { color: #4a5568; }

    .btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .status.info  { background: #1e3a5f; color: #93c5fd; display: block; }
    .status.error { background: #3b1f1f; color: #fca5a5; display: block; }
    .status.ok    { background: #1a3828; color: #86efac; display: block; }

    .progress-wrap { margin-top: 14px; display: none; }
    .progress-wrap.visible { display: block; }

    progress {
      width: 100%;
      height: 6px;
      border-radius: 4px;
      appearance: none;
      -webkit-appearance: none;
      background: #2d3147;
      overflow: hidden;
    }

    progress::-webkit-progress-bar { background: #2d3147; border-radius: 4px; }
    progress::-webkit-progress-value { background: linear-gradient(90deg,#3b82f6,#8b5cf6); border-radius: 4px; }

    .progress-label {
      text-align: right;
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 4px;
    }

    /* Bookmarklet tab */
    .bm-box {
      margin-top: 20px;
      background: #12141e;
      border: 1px dashed #3b82f6;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .bm-link {
      display: inline-block;
      padding: 10px 20px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      cursor: grab;
      user-select: none;
      margin: 14px 0;
    }

    .bm-link:active { cursor: grabbing; }

    .bm-desc {
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.6;
    }

    .bm-steps {
      text-align: left;
      margin-top: 16px;
      padding: 14px;
      background: #1a1d27;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 2;
    }

    .bm-steps b { color: #e2e8f0; }

    .highlight { color: #60a5fa; }
  </style>
</head>
<body>
<div class="card">
  <h1>影片下載器</h1>

  <div class="tabs">
    <button class="tab-btn active" data-tab="direct">直接下載</button>
    <button class="tab-btn" data-tab="ytdlp">進階下載（yt-dlp）</button>
    <button class="tab-btn" data-tab="bookmarklet">書籤偵測器</button>
  </div>

  <!-- 直接下載 -->
  <div class="tab-panel active" id="tab-direct">
    <label>影片直連網址（.mp4）</label>
    <input type="text" id="direct-url" placeholder="https://example.com/video.mp4" />

    <label>儲存檔名（選填）</label>
    <input type="text" id="direct-filename" placeholder="video.mp4" />

    <button class="btn" id="direct-btn" onclick="downloadDirect()">開始下載</button>

    <div class="progress-wrap" id="direct-progress">
      <progress id="direct-bar" value="0" max="100"></progress>
      <div class="progress-label" id="direct-progress-label">0%</div>
    </div>

    <div class="status" id="direct-status"></div>
  </div>

  <!-- yt-dlp 下載 -->
  <div class="tab-panel" id="tab-ytdlp">
    <label>影片網址（YouTube、Twitter、Instagram 等）</label>
    <input type="text" id="ytdlp-url" placeholder="https://www.youtube.com/watch?v=..." />

    <button class="btn" id="ytdlp-btn" onclick="downloadYtdlp()">開始下載</button>

    <div class="status" id="ytdlp-status"></div>
  </div>

  <!-- 書籤偵測器 -->
  <div class="tab-panel" id="tab-bookmarklet">
    <div class="bm-box">
      <div class="bm-desc">將下方按鈕拖曳到瀏覽器書籤列</div>

      <a id="bm-link" class="bm-link" href="#" draggable="true">📹 影片偵測器</a>

      <div class="bm-steps">
        <b>使用方式：</b><br>
        1. 把上方按鈕 <span class="highlight">拖曳到書籤列</span>（或右鍵加入書籤）<br>
        2. 前往任何有影片的網頁<br>
        3. 點一下書籤列的「📹 影片偵測器」<br>
        4. 頁面右上角會出現浮動面板<br>
        5. 觸發影片播放 → 面板自動偵測 URL<br>
        6. 點「直接下載」或「yt-dlp」→ 自動開啟本頁並下載
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
  // Build bookmarklet href dynamically
  (function() {
    var API = CONFIG.API_BASE || 'http://157.245.200.214:3002';

    var fn = function(A) {
      if (document.getElementById('_vdp')) return;
      var F = new Set();
      var urlToEl = new Map();
      var activeUrl = null;

      var p = document.createElement('div');
      p.id = '_vdp';
      p.style.cssText = 'position:fixed;top:12px;right:12px;z-index:2147483647;background:#1a1d27;color:#e2e8f0;padding:14px;border-radius:10px;width:340px;max-height:520px;overflow-y:auto;font-family:system-ui,sans-serif;font-size:13px;border:1px solid #3b82f6;box-shadow:0 8px 30px rgba(0,0,0,.7)';

      var h = document.createElement('div');
      h.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:10px';
      h.innerHTML = '<b style="color:#60a5fa;font-size:14px">\uD83D\uDCF9 \u5F71\u7247\u5075\u6E2C\u5668</b>';
      var xb = document.createElement('button');
      xb.textContent = '\u2715';
      xb.style.cssText = 'background:none;border:none;color:#94a3b8;cursor:pointer;font-size:16px;line-height:1';
      xb.onclick = function() { p.remove(); };
      h.appendChild(xb);
      p.appendChild(h);

      var st = document.createElement('div');
      st.style.cssText = 'color:#64748b;font-size:12px;margin-bottom:8px';
      st.textContent = '\u76e3\u807d\u4e2d\uff0c\u8acb\u89f8\u767c\u5f71\u7247\u8f09\u5165...';
      p.appendChild(st);

      var li = document.createElement('div');
      p.appendChild(li);
      document.body.appendChild(p);

      function markActive(url) {
        if (!url) return;
        urlToEl.forEach(function(el) {
          el.style.border = '1px solid transparent';
          var b = el.querySelector('._vdb');
          if (b) b.remove();
        });
        activeUrl = url;
        var found = null;
        if (urlToEl.has(url)) {
          found = url;
        } else {
          urlToEl.forEach(function(el, u) {
            if (!found && (url.indexOf(u) !== -1 || u.indexOf(url) !== -1)) found = u;
          });
        }
        if (found && urlToEl.has(found)) {
          var el = urlToEl.get(found);
          el.style.border = '1px solid #22c55e';
          var badge = document.createElement('span');
          badge.className = '_vdb';
          badge.textContent = '\u25B6 \u64AD\u653E\u4E2D';
          badge.style.cssText = 'background:#166534;color:#86efac;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:middle';
          el.firstChild.appendChild(badge);
          el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }

      function mk(label, bg, fn) {
        var b = document.createElement('button');
        b.textContent = label;
        b.style.cssText = 'flex:1;padding:4px 2px;background:' + bg + ';border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:11px';
        b.onclick = fn; return b;
      }

      function addItem(u) {
        if (!u || F.has(u)) return;
        F.add(u);
        st.textContent = '\u5075\u6e2c\u5230 ' + F.size + ' \u500b\u5f71\u7247';

        var isBlob = u.indexOf('blob:') === 0;

        var d = document.createElement('div');
        d.style.cssText = 'background:#12141e;border-radius:6px;padding:8px;margin-top:6px;border:1px solid transparent;transition:border-color .3s';
        urlToEl.set(u, d);

        var t = document.createElement('div');
        t.style.cssText = 'color:#86efac;font-size:11px;word-break:break-all;margin-bottom:5px';
        t.textContent = (isBlob ? '[Blob] ' : '') + (u.length > 65 ? u.slice(0, 65) + '\u2026' : u);
        d.appendChild(t);

        var r = document.createElement('div');
        r.style.cssText = 'display:flex;gap:4px';

        if (isBlob) {
          // blob: URL — try direct anchor download; if it's a MediaSource blob it may not work
          r.appendChild(mk('\u4E0B\u8F09\uFF08\u672C\u6A5F\uFF09', '#059669', function() {
            try {
              var a = document.createElement('a');
              a.href = u;
              a.download = 'video.mp4';
              document.body.appendChild(a); a.click(); a.remove();
            } catch(e) { alert('\u5931\u6557\uff1a' + e.message); }
          }));
          // Show hint below URL text
          var hint = document.createElement('div');
          hint.style.cssText = 'color:#f59e0b;font-size:10px;margin-top:3px';
          hint.textContent = '\u26a0 Blob URL\uff08MSE\u4e32\u6d41\uff09\u82e5\u4e0b\u8f09\u5931\u6557\uff0c\u8acb\u5411\u4e0b\u627e m3u8/mp4 \u7db2\u5740\u4e26\u4f7f\u7528 yt-dlp \u4e0b\u8f09';
          d.insertBefore(hint, r);
        } else {
          r.appendChild(mk('\u76f4\u63a5\u4e0b\u8f09', '#3b82f6', function() {
            window.open(A + '/?url=' + encodeURIComponent(u) + '&mode=direct', '_blank');
          }));
          r.appendChild(mk('yt-dlp', '#8b5cf6', function() {
            window.open(A + '/?url=' + encodeURIComponent(u) + '&mode=ytdlp', '_blank');
          }));
        }

        var cp = mk('\u8907\u88fd', '#374151', function() {
          navigator.clipboard.writeText(u);
          cp.textContent = '\u2713';
          setTimeout(function() { cp.textContent = '\u8907\u88fd'; }, 1500);
        });
        r.appendChild(cp);
        d.appendChild(r);
        li.prepend(d);

        if (activeUrl && (activeUrl === u || activeUrl.indexOf(u) !== -1 || u.indexOf(activeUrl) !== -1)) markActive(activeUrl);
      }

      function watchVideo(v) {
        function onPlay() {
          var u = v.currentSrc || v.src || v.getAttribute('src');
          if (!u) return;
          if (!urlToEl.has(u)) addItem(u);
          markActive(u);
        }
        v.addEventListener('play', onPlay);
        v.addEventListener('playing', onPlay);
        if (!v.paused) {
          var u = v.currentSrc || v.src || v.getAttribute('src');
          if (u) { if (!urlToEl.has(u)) addItem(u); markActive(u); }
        }
      }

      document.querySelectorAll('video').forEach(watchVideo);

      function add(u) {
        if (!u || F.has(u)) return;
        var isBlob = u.indexOf('blob:') === 0;
        if (!isBlob && !/\.(mp4|m3u8|webm|mov|ts|flv|mkv)([?#]|$)/i.test(u)) return;
        addItem(u);
      }

      var _f = window.fetch;
      window.fetch = function() {
        var u = typeof arguments[0] === 'string' ? arguments[0] : (arguments[0] && arguments[0].url);
        add(u); return _f.apply(this, arguments);
      };
      var _x = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(m, u) {
        add(String(u || '')); return _x.apply(this, arguments);
      };

      document.querySelectorAll('video,source').forEach(function(e) {
        add(e.src || e.currentSrc || e.getAttribute('src'));
      });

      new MutationObserver(function(ms) {
        ms.forEach(function(m) {
          m.addedNodes.forEach(function(n) {
            if (n.nodeType !== 1) return;
            if (n.tagName === 'VIDEO') { watchVideo(n); add(n.src || n.currentSrc || n.getAttribute('src')); }
            if (n.tagName === 'SOURCE') add(n.src || n.getAttribute('src'));
            if (n.querySelectorAll) {
              n.querySelectorAll('video').forEach(watchVideo);
              n.querySelectorAll('video,source').forEach(function(e) { add(e.src || e.currentSrc || e.getAttribute('src')); });
            }
          });
        });
      }).observe(document.body, { childList: true, subtree: true });
    };

    var code = '(' + fn.toString() + ')(' + JSON.stringify(API) + ')';
    document.getElementById('bm-link').href = 'javascript:' + encodeURIComponent(code);
  })();

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // Auto-fill from URL params (sent by bookmarklet)
  (function() {
    const params = new URLSearchParams(window.location.search);
    const u = params.get('url');
    const mode = params.get('mode');
    if (!u) return;

    history.replaceState({}, '', window.location.pathname);

    if (mode === 'ytdlp') {
      document.querySelector('[data-tab="ytdlp"]').click();
      document.getElementById('ytdlp-url').value = u;
      downloadYtdlp();
    } else {
      document.querySelector('[data-tab="direct"]').click();
      document.getElementById('direct-url').value = u;
      downloadDirect();
    }
  })();

  function setStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  async function downloadDirect() {
    const url = document.getElementById('direct-url').value.trim();
    const filename = document.getElementById('direct-filename').value.trim() || 'video.mp4';
    if (!url) return setStatus('direct-status', '請輸入影片網址', 'error');

    const btn = document.getElementById('direct-btn');
    const progressWrap = document.getElementById('direct-progress');
    const bar = document.getElementById('direct-bar');
    const label = document.getElementById('direct-progress-label');

    btn.disabled = true;
    progressWrap.classList.add('visible');
    bar.value = 0;
    label.textContent = '0%';
    setStatus('direct-status', '下載中...', 'info');

    try {
      const res = await fetch(CONFIG.API_BASE + '/download/direct', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, filename })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
      }

      const contentLength = res.headers.get('Content-Length');
      const total = contentLength ? parseInt(contentLength, 10) : 0;
      let received = 0;
      const chunks = [];
      const reader = res.body.getReader();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        if (total > 0) {
          const pct = Math.round((received / total) * 100);
          bar.value = pct;
          label.textContent = pct + '%';
        } else {
          label.textContent = (received / 1024 / 1024).toFixed(1) + ' MB';
        }
      }

      bar.value = 100;
      label.textContent = '100%';

      const blob = new Blob(chunks);
      triggerDownload(blob, filename);
      setStatus('direct-status', '下載完成！', 'ok');
    } catch (e) {
      setStatus('direct-status', '錯誤：' + e.message, 'error');
      progressWrap.classList.remove('visible');
    } finally {
      btn.disabled = false;
    }
  }

  async function downloadYtdlp() {
    const url = document.getElementById('ytdlp-url').value.trim();
    if (!url) return setStatus('ytdlp-status', '請輸入影片網址', 'error');

    const btn = document.getElementById('ytdlp-btn');
    btn.disabled = true;
    setStatus('ytdlp-status', '正在用 yt-dlp 下載，請稍候（可能需要數十秒）…', 'info');

    try {
      const res = await fetch(CONFIG.API_BASE + '/download/ytdlp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
      }

      const disposition = res.headers.get('Content-Disposition') || '';
      const match = disposition.match(/filename="?([^"]+)"?/);
      const filename = match ? match[1] : 'video.mp4';

      const blob = await res.blob();
      triggerDownload(blob, filename);
      setStatus('ytdlp-status', '下載完成！', 'ok');
    } catch (e) {
      setStatus('ytdlp-status', '錯誤：' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
